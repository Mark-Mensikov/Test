<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tagasiside Portaal PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.25.2/pocketbase.umd.js"></script>
<style>
:root {
    --primary: #007bff;
    --success: #28a745;
    --danger: #dc3545;
    --vip: #ffd700;
    --admin: #ff4757;
    --bg: #f4f7f6;
    --light: #e9ecef;
}
body { font-family: system-ui, sans-serif; max-width:900px; margin:0 auto; padding:20px; background:var(--bg); }
.card { background:white; padding:16px; margin-bottom:16px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.post { display:flex; gap:16px; padding-left:12px; border-left:5px solid var(--primary); }
.post.under-review { border-left-color:#6c757d; background:#fffef5; }
.post.completed { border-left-color:var(--success); }
.post.rejected { border-left-color:var(--danger); opacity:0.75; background:#f8d7da; }
.post.is-vip { border-left-color:var(--vip); background:#fffdf0; }
.post.is-admin-post { border-left-color:var(--admin); background:#fff5f5; border-left-width:10px; }
.vote-area { text-align:center; min-width:60px; }
.vote-btn { font-size:1.6rem; padding:2px 10px; cursor:pointer; }
.up.active { color:var(--success); font-weight:bold; }
.down.active { color:var(--danger); font-weight:bold; }
.score { font-weight:bold; font-size:1.2rem; margin:4px 0; }
.meta { color:#555; font-size:0.9rem; margin:8px 0; }
.badge { padding:3px 8px; border-radius:12px; font-size:0.8rem; font-weight:bold; }
.admin { background:var(--admin); color:white; }
.vip { background:var(--vip); color:black; }
.pending { background:#ffc107; color:black; }
.success { background:var(--success); color:white; }
.danger { background:var(--danger); color:white; }
.comment { background:var(--light); padding:10px; margin:8px 0; border-radius:8px; }
.comment-actions { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; }
.reply-hint { margin:8px 0; font-size:0.9rem; color:#333; }
.comment-form { display:flex; gap:8px; margin-top:12px; }
button { padding:6px 12px; border:none; border-radius:6px; cursor:pointer; }
button.primary { background:var(--primary); color:white; }
button.success { background:var(--success); color:white; }
button.danger { background:var(--danger); color:white; }
button.outline { border:1px solid #ccc; background:white; }
#errorBox { background:#ffebee; color:#c62828; padding:16px; margin:16px 0; border-radius:8px; border-left:5px solid #c62828; display:none; }
.vip-promo { background:#fff9c4; border:1px solid #ffe082; }
</style>
</head>
<body>
<div class="card">
    <h2>💡 Ettepanekud</h2>
    <div id="auth"></div>
</div>

<div id="vip-promo" class="card vip-promo" style="display:none;">
    <strong>Saa VIP-ks!</strong> Sinu ettepanekud tõstetakse esile.<br><br>
    <a href="https://buy.stripe.com/test_aFacN53uE0TNgqoeEHe7m02"><button style="background:var(--vip); color:black; padding:10px 20px;">Osta VIP (15€)</button></a>
</div>

<div id="errorBox"></div>

<div id="authBox" class="card" style="display:none;">
    <input id="email" placeholder="E-mail" type="email">
    <input id="password" placeholder="Parool" type="password">
    <button class="primary" onclick="login()">Logi sisse</button>
    <button onclick="register()">Registreeri</button>
</div>

<div id="newPost" class="card" style="display:none;">
    <input id="title" placeholder="Pealkiri">
    <textarea id="desc" placeholder="Kirjeldus..."></textarea>
    <button class="primary" onclick="createPost()">Saada ettepanek</button>
</div>

<div id="posts"></div>

<script>
const pb = new PocketBase("http://pocketbase-hv4bvovfn86uwdafxs7d7p1s.176.112.158.3.sslip.io");
pb.autoCancellation(false);

let currentUser = null;
let myVotes = new Set();
const replyTargetByPost = {};

function isVip(user) {
    return !!(user && (user.verified || user.is_pro));
}

async function setVipFlag(userId, enabled) {
    try {
        return await pb.collection('users').update(userId, { verified: enabled });
    } catch (err) {
        // Backward compatibility for older schemas that still use is_pro.
        return await pb.collection('users').update(userId, { is_pro: enabled });
    }
}

window.onload = async () => {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('payment') === 'success' && pb.authStore.isValid) {
        try {
            await setVipFlag(pb.authStore.model.id, true);
            await pb.collection('users').authRefresh();
            window.history.replaceState({}, document.title, "/");
        } catch(e) { console.error(e); }
    }

    currentUser = pb.authStore.model;
    renderAuth();
    if (currentUser) await loadMyVotes().catch(console.error);
    await loadPosts();

    pb.collection("posts").subscribe("*", () => loadPosts());
    try {
        pb.collection("comments").subscribe("*", () => loadPosts());
    } catch (e) {
        console.warn("Comments subscription disabled:", e?.message || e);
    }
};

function renderAuth() {
    const el = document.getElementById("auth");
    const vipPromo = document.getElementById("vip-promo");
    if (currentUser) {
        let badges = '';
        if (currentUser.is_admin) badges += '<span class="badge admin">ADMIN</span>';
        if (isVip(currentUser)) badges += '<span class="badge vip">VIP</span>';
        el.innerHTML = `${currentUser.email} ${badges} <button onclick="logout()">Logi välja</button>`;
        document.getElementById("newPost").style.display = "block";
        vipPromo.style.display = (isVip(currentUser) || currentUser.is_admin) ? 'none' : 'block';
    } else {
        el.innerHTML = `<button onclick="document.getElementById('authBox').style.display='block'">Logi sisse / Registreeri</button>`;
        vipPromo.style.display = 'none';
    }
}

async function login() {
    try {
        await pb.collection("users").authWithPassword(document.getElementById("email").value.trim(), document.getElementById("password").value);
        location.reload();
    } catch(e){ alert("Sisselogimine ebaõnnestus"); }
}

async function register() {
    try {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;
        await pb.collection("users").create({email, password:pass, passwordConfirm:pass});
        await login();
    } catch(e){ alert("Registreerimine ebaõnnestus"); }
}

function logout() {
    pb.authStore.clear();
    location.reload();
}

async function loadMyVotes() {
    if (!currentUser) return;
    const records = await pb.collection("votes").getFullList({filter: `user="${currentUser.id}"`, fields:"post,direction"});
    myVotes = new Set(records.map(r => `${r.post}:${r.direction}`));
}

async function loadPosts() {
    document.getElementById("errorBox").style.display = "none";
    try {
        let filter = "";
        if (!currentUser || !currentUser.is_admin) {
            // Only admin can see posts that are still under review or rejected.
            filter = 'status = "completed"';
        }

        const postsData = await pb.collection("posts").getFullList({
            sort:"-created",
            expand:"author",
            filter,
            fields:"id,title,description,status,author,created,expand.author.id,expand.author.email,expand.author.is_admin,expand.author.verified,expand.author.is_pro"
        });
        const votesData = await pb.collection("votes").getFullList({ fields: "post,direction" });
        const scoreByPost = {};
        votesData.forEach(v => {
            const dir = Number(v.direction) || 0;
            if (!scoreByPost[v.post]) scoreByPost[v.post] = 0;
            scoreByPost[v.post] += dir;
        });

        let commentsData = [];
        try {
            commentsData = await pb.collection("comments").getFullList({sort:"created", expand:"user"});
        } catch (e) {
            commentsData = [];
        }
        const commentsByPost = {};
        commentsData.forEach(c => { 
            if(!commentsByPost[c.post]) commentsByPost[c.post]=[]; 
            commentsByPost[c.post].push(c); 
        });

        document.getElementById("posts").innerHTML = postsData.map(post => {
            const author = post.expand?.author || {};
            const isAdmin = currentUser?.is_admin || false;
            const currentUserIsVip = isVip(currentUser);
            const authorIsVip = isVip(author);
            const authorDisplay = currentUser ? (author.email || "Kasutaja") : "Anonüümne";
            const canEditPost = !!currentUser && (isAdmin || (currentUserIsVip && post.author === currentUser.id));
            const myVote = [...myVotes].find(v=>v.startsWith(post.id+":"))?.split(":")[1] || null;
            const score = scoreByPost[post.id] || 0;

            let cls = `card post ${post.status}`;
            if(author.is_admin) cls += " is-admin-post";
            else if(authorIsVip) cls += " is-vip";

            let badge = "";
            if(post.status==="under-review") badge = '<span class="badge pending">Ülevaatusel</span>';
            if(post.status==="completed") badge = '<span class="badge success">Teostatud</span>';
            if(post.status==="rejected") badge = '<span class="badge danger">Tagasi lükatud</span>';

            return `
            <div class="${cls}">
                <div class="vote-area">
                    <button class="vote-btn up ${myVote==='1'?'active':''}" onclick="castVote('${post.id}',1)">▲</button>
                    <div class="score">${score>0?'+'+score:score}</div>
                    <button class="vote-btn down ${myVote==='-1'?'active':''}" onclick="castVote('${post.id}',-1)">▼</button>
                </div>
                <div style="flex:1">
                    <h3>${post.title}</h3>
                    <p>${post.description}</p>
                    <div class="meta">${authorDisplay} ${badge}</div>
                   
                    ${(isAdmin || canEditPost) ? `
                    <div style="margin:12px 0;display:flex;gap:8px;flex-wrap:wrap;">
                        ${canEditPost ? `<button class="outline" onclick="startEditPost('${post.id}','${encodeURIComponent(post.title || "")}','${encodeURIComponent(post.description || "")}')">Muuda</button>` : ''}
                        ${post.status==="under-review" ? `<button class="success" onclick="moderate('${post.id}','completed')">Teostatud ✓</button><button class="danger" onclick="moderate('${post.id}','rejected')">Lükata tagasi ✗</button>` : ''}
                        ${post.status==="rejected" ? `<button class="success outline" onclick="moderate('${post.id}','under-review')">Tagasi ülevaatusele</button>` : ''}
                        ${isAdmin ? `<button onclick="toggleVip('${post.author}', ${authorIsVip})" style="background:var(--vip); color:black;">${authorIsVip ? 'Võta VIP ära' : 'Anna VIP'}</button>` : ''}
                        ${isAdmin ? `<button class="danger outline" onclick="deletePost('${post.id}')">Kustuta</button>` : ''}
                    </div>` : ""}

                    <div id="edit-${post.id}" class="card" style="display:none; margin-top:8px;">
                        <input id="edit-title-${post.id}" placeholder="Uus pealkiri">
                        <textarea id="edit-desc-${post.id}" placeholder="Uus kirjeldus"></textarea>
                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <button class="primary" onclick="savePostEdit('${post.id}')">Salvesta</button>
                            <button class="outline" onclick="cancelEditPost('${post.id}')">Tühista</button>
                        </div>
                    </div>
                   
                    <div style="margin-top:16px;">
                        ${(commentsByPost[post.id]||[]).map(c => {
                            const canDeleteComment = !!currentUser && (isAdmin || c.user === currentUser.id);
                            const commentAuthor = c.expand?.user?.email || "Anonüümne";
                            const canReply = !!currentUser;
                            return `<div class="comment"><strong>${commentAuthor}</strong><p>${c.text}</p><div class="comment-actions">${canReply ? `<button class="outline" onclick="setReplyTarget('${post.id}','${c.id}','${encodeURIComponent(commentAuthor)}')">Vasta</button>` : ''}${canDeleteComment ? `<button class="danger outline" onclick="deleteComment('${c.id}')">Kustuta kommentaar</button>` : ''}</div></div>`;
                        }).join("") || "<small>Kommentaare pole</small>"}
                        ${currentUser ? `<div id="reply-hint-${post.id}" class="reply-hint" style="display:none;"></div><form class="comment-form" onsubmit="addComment(event,'${post.id}');return false;"><input type="text" id="c-${post.id}" placeholder="Kommentaar..." required><button class="primary">Saada</button><button type="button" class="outline" onclick="clearReplyTarget('${post.id}')">Tühista vastus</button></form>` : ""}
                    </div>
                </div>
            </div>`;
        }).join("") || "<p>Ettepanekuid pole</p>";
    } catch (err) {
        console.error(err);
        document.getElementById("errorBox").innerHTML = "Viga: " + (err.message || "tundmatu");
        document.getElementById("errorBox").style.display = "block";
    }
}

async function castVote(postId, direction) {
    if (!currentUser) return alert("Logi sisse");
    direction = Number(direction);

    try {
        const post = await pb.collection("posts").getOne(postId, {expand:"author"});
        if (post.author === currentUser.id) return alert("Ei saa hääletada oma ettepaneku poolt");

        // Find current vote for this post (if any) to apply correct score delta.
        const existingVotes = await pb.collection("votes").getFullList({
            filter: `user="${currentUser.id}" && post="${postId}"`
        });

        const existingVote = existingVotes[0] || null;
        const previousDirection = existingVote ? Number(existingVote.direction) : 0;

        if (existingVote && previousDirection === direction) {
            // Clicking the same direction removes the vote.
            await pb.collection("votes").delete(existingVote.id);
        } else if (existingVote) {
            // Switch direction. Some API rules allow delete/create but forbid update.
            try {
                await pb.collection("votes").update(existingVote.id, { direction });
            } catch (switchErr) {
                await pb.collection("votes").delete(existingVote.id);
                await pb.collection("votes").create({
                    user: currentUser.id,
                    post: postId,
                    direction: direction
                });
            }
        } else {
            // Create first vote.
            await pb.collection("votes").create({
                user: currentUser.id,
                post: postId,
                direction: direction
            });
        }

        await loadMyVotes();
        await loadPosts();
    } catch (err) {
        console.error("castVote error:", err);
        let msg = "Viga hääletamisel";
        if (err.status === 400) msg = "400: Kontrolli votes API Rules või direction välja tüüpi";
        if (err.status === 403) msg = "Puuduvad õigused votes collection-is";
        if (err?.response?.message) msg += `\n${err.response.message}`;
        alert(msg);
    }
}

function setReplyTarget(postId, commentId, encodedAuthor) {
    const author = decodeURIComponent(encodedAuthor || "Anonüümne");
    replyTargetByPost[postId] = { commentId, author };
    const hintEl = document.getElementById(`reply-hint-${postId}`);
    if (hintEl) {
        hintEl.style.display = "block";
        hintEl.textContent = `Vastus kommentaarile: ${author}`;
    }
    const input = document.getElementById(`c-${postId}`);
    if (input) {
        input.focus();
        if (!input.value.trim()) input.value = `@${author} `;
    }
}

function clearReplyTarget(postId) {
    delete replyTargetByPost[postId];
    const hintEl = document.getElementById(`reply-hint-${postId}`);
    if (hintEl) {
        hintEl.style.display = "none";
        hintEl.textContent = "";
    }
}

async function moderate(id, status) {
    if (!currentUser?.is_admin) return alert("Puuduvad õigused");
    if (!confirm(`Muuta staatus "${status}"?`)) return;
    await pb.collection("posts").update(id, {status});
    loadPosts();
}

function startEditPost(postId, titleEncoded, descEncoded) {
    const box = document.getElementById(`edit-${postId}`);
    const title = document.getElementById(`edit-title-${postId}`);
    const desc = document.getElementById(`edit-desc-${postId}`);
    if (!box || !title || !desc) return;
    title.value = decodeURIComponent(titleEncoded || "");
    desc.value = decodeURIComponent(descEncoded || "");
    box.style.display = "block";
}

function cancelEditPost(postId) {
    const box = document.getElementById(`edit-${postId}`);
    if (box) box.style.display = "none";
}

async function savePostEdit(postId) {
    const title = document.getElementById(`edit-title-${postId}`)?.value.trim();
    const description = document.getElementById(`edit-desc-${postId}`)?.value.trim();
    if (!title) return alert("Pealkiri on kohustuslik");
    try {
        await pb.collection("posts").update(postId, { title, description });
        cancelEditPost(postId);
        await loadPosts();
    } catch (e) {
        alert("Muutmine ebaõnnestus");
    }
}

async function deletePost(id) {
    if (!currentUser?.is_admin) return alert("Puuduvad õigused");
    if (!confirm("Kustutada ettepanek lõplikult?")) return;
    await pb.collection("posts").delete(id);
    loadPosts();
}

async function deleteComment(commentId) {
    if (!currentUser) return alert("Logi sisse");
    try {
        const comment = await pb.collection("comments").getOne(commentId);
        const canDelete = currentUser.is_admin || comment.user === currentUser.id;
        if (!canDelete) return alert("Saad kustutada ainult oma kommentaare");
        if (!confirm("Kustutada kommentaar?")) return;
        await pb.collection("comments").delete(commentId);
        await loadPosts();
    } catch (e) {
        alert("Kommentaari kustutamine ebaõnnestus");
    }
}

async function addComment(e, postId) {
    e.preventDefault();
    const input = document.getElementById(`c-${postId}`);
    let text = input.value.trim();
    if (!text) return;
    const replyTarget = replyTargetByPost[postId];
    if (replyTarget && !text.startsWith(`@${replyTarget.author}`)) {
        text = `@${replyTarget.author} ${text}`;
    }
    await pb.collection("comments").create({post:postId, user:currentUser.id, text});
    input.value = "";
    clearReplyTarget(postId);
    loadPosts();
}

async function createPost() {
    const title = document.getElementById("title").value.trim();
    const desc = document.getElementById("desc").value.trim();
    if (!title) return alert("Pealkiri on kohustuslik");
    await pb.collection("posts").create({title, description:desc, author:currentUser.id, status:"under-review", upvotes:0, downvotes:0});
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    loadPosts();
}

async function toggleVip(userId, isCurrentlyPro) {
    if (!currentUser?.is_admin) return alert("Puuduvad õigused");
    if (!confirm(isCurrentlyPro ? "Võtta VIP staatus ära?" : "Anna VIP staatus?")) return;
    try {
        await setVipFlag(userId, !isCurrentlyPro);
        loadPosts();
    } catch(e) { alert("Viga VIP muutmisel!"); }
}
</script>
</body>
</html>
