<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagasiside Portaal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: var(--bg); color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-box { text-align: right; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; background: var(--primary); color: white; transition: 0.2s; font-weight: 600; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .post { display: flex; align-items: flex-start; gap: 20px; }
        .vote-section { text-align: center; min-width: 60px; }
        .vote-count { display: block; font-size: 20px; font-weight: bold; margin: 5px 0; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: #eee; text-transform: uppercase; color: #666; }
        .nav-link { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>

    <div class="auth-box" id="auth-section">Laadin...</div>

    <div id="auth-forms" class="card" style="display: none;">
        <div id="login-view">
            <h3>Logi sisse</h3>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Parool">
            <button onclick="handleLogin()">Sisene</button>
            <p>Pole kontot? <span class="nav-link" onclick="toggleAuth(true)">Registreeri siin</span></p>
        </div>
        <div id="register-view" style="display: none;">
            <h3>Loo uus konto</h3>
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Parool (min 8 märki)">
            <input type="password" id="reg-pass-confirm" placeholder="Kinnita parool">
            <button onclick="handleRegister()" style="background: var(--success)">Loo konto</button>
            <p>On juba konto? <span class="nav-link" onclick="toggleAuth(false)">Logi sisse siin</span></p>
        </div>
    </div>

    <div id="new-post-form" class="card" style="display: none;">
        <h3>Lisa uus ettepanek</h3>
        <input type="text" id="post-title" placeholder="Mida saaksime parandada?">
        <textarea id="post-desc" rows="3" placeholder="Kirjelda oma ideed lähemalt..."></textarea>
        <button onclick="createNewPost()">Saada ettepanek</button>
    </div>

    <h2>Kõik ettepanekud</h2>
    <div id="posts-list">Laadin postitusi...</div>

    <script>
        let pb;

        async function init() {
            const config = await fetch('/config').then(res => res.json());
            pb = new PocketBase(config.pbUrl);
            renderUI();
            loadPosts();
        }

        function renderUI() {
            const authSection = document.getElementById('auth-section');
            const postForm = document.getElementById('new-post-form');
            const authForms = document.getElementById('auth-forms');

            if (pb.authStore.isValid) {
                authSection.innerHTML = `👤 ${pb.authStore.model.email} | <button onclick="logout()" style="background:var(--danger)">Välju</button>`;
                postForm.style.display = 'block';
                authForms.style.display = 'none';
            } else {
                authSection.innerHTML = `<button onclick="document.getElementById('auth-forms').style.display='block'">Logi sisse / Registreeri</button>`;
                postForm.style.display = 'none';
            }
        }

        function toggleAuth(showReg) {
            document.getElementById('login-view').style.display = showReg ? 'none' : 'block';
            document.getElementById('register-view').style.display = showReg ? 'block' : 'none';
        }

        async function handleLogin() {
            try {
                await pb.collection('users').authWithPassword(
                    document.getElementById('login-email').value,
                    document.getElementById('login-pass').value
                );
                location.reload();
            } catch (e) { alert("Viga: " + e.message); }
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-password-confirm'); // Исправлено ID
            
            try {
                await pb.collection('users').create({
                    email, password: pass, passwordConfirm: document.getElementById('reg-pass-confirm').value
                });
                await pb.collection('users').authWithPassword(email, pass);
                location.reload();
            } catch (e) { alert("Viga: " + e.message); }
        }

        async function loadPosts() {
            const container = document.getElementById('posts-list');
            try {
                const posts = await pb.collection('posts').getFullList({ sort: '-votes' });
                container.innerHTML = posts.map(p => `
                    <div class="card post">
                        <div class="vote-section">
                            <button onclick="vote('${p.id}')" ${!pb.authStore.isValid ? 'disabled' : ''} style="background:#eee; color:#333; width:100%">▲</button>
                            <span class="vote-count">${p.votes || 0}</span>
                        </div>
                        <div style="flex:1">
                            <span class="status-badge">${p.status || 'uudis'}</span>
                            <h3 style="margin: 10px 0 5px 0">${p.title}</h3>
                            <p style="color:#666; margin:0">${p.description || ''}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Viga laadimisel."; }
        }

        async function createNewPost() {
            try {
                await pb.collection('posts').create({
                    title: document.getElementById('post-title').value,
                    description: document.getElementById('post-desc').value,
                    votes: 0,
                    status: 'under-review',
                    author: pb.authStore.model.id
                });
                location.reload();
            } catch (e) { alert(e.message); }
        }

        async function vote(postId) {
            try {
                await pb.collection('votes').create({ user: pb.authStore.model.id, post: postId });
                const post = await pb.collection('posts').getOne(postId);
                await pb.collection('posts').update(postId, { votes: (post.votes || 0) + 1 });
                loadPosts();
            } catch (e) { alert("Sa oled juba hääletanud!"); }
        }

        function logout() { pb.authStore.clear(); location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
