<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Board PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>

<style>
:root {
    --primary:#007bff;
    --vip:#ffd700;
    --admin:#ff4757;
    --bg:#f4f7f6;
}

body {
    font-family: Arial;
    max-width:800px;
    margin:0 auto;
    padding:20px;
    background:var(--bg);
}

.card {
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.post {
    display:flex;
    gap:15px;
    border-left:5px solid var(--primary);
}

.post.is-vip { border-left-color:var(--vip); }
.post.is-admin { border-left-color:var(--admin); }

.vote {
    text-align:center;
}

.vote button {
    padding:5px 10px;
}

.vip { background:var(--vip); padding:2px 6px; }
.admin { background:var(--admin); color:white; padding:2px 6px; }
</style>
</head>

<body>

<div class="card">
    <h2>💡 Feedback</h2>
    <div id="auth"></div>
</div>

<div id="authBox" class="card" style="display:none;">
    <input id="login-email" placeholder="Email">
    <input id="login-pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<div id="newPost" class="card" style="display:none;">
    <input id="title" placeholder="Title">
    <textarea id="desc"></textarea>
    <button onclick="createPost()">Post</button>
</div>

<div id="posts"></div>

<script>
const pb = new PocketBase("http://pocketbase-hv4bvovfn86uwdafxs7d7p1s.176.112.158.3.sslip.io");

let user = null;
let voted = [];

window.onload = async () => {
    user = pb.authStore.model;
    renderAuth();

    if(user) await loadVotes();
    loadPosts();
};

function renderAuth(){
    const el = document.getElementById("auth");

    if(user){
        el.innerHTML = `
            ${user.email}
            ${user.is_admin ? '<span class="admin">ADMIN</span>' : ''}
            ${user.is_pro ? '<span class="vip">VIP</span>' : ''}
            <button onclick="logout()">Logout</button>
        `;
        newPost.style.display = "block";
    } else {
        el.innerHTML = `<button onclick="authBox.style.display='block'">Login</button>`;
    }
}

async function login(){
    await pb.collection("users").authWithPassword(
        document.getElementById("login-email").value,
        document.getElementById("login-pass").value
    );
    location.reload();
}

async function register(){
    const email = document.getElementById("login-email").value;
    const pass = document.getElementById("login-pass").value;

    await pb.collection("users").create({
        email,
        password: pass,
        passwordConfirm: pass
    });

    await login();
}

function logout(){
    pb.authStore.clear();
    location.reload();
}

async function loadVotes(){
    const res = await pb.collection("votes").getFullList({
        filter: `user="${user.id}"`
    });

    voted = res.map(v => v.post);
}

async function loadPosts(){
    const data = await pb.collection("posts").getFullList({
        sort:"-created",
        expand:"author"
    });

    posts.innerHTML = data.map(p => {

        const a = p.expand?.author;

        if(p.status !== "completed" && user?.id !== p.author && !user?.is_admin) return "";

        let cls = "card post";
        if(a?.is_admin) cls += " is-admin";
        else if(a?.is_pro) cls += " is-vip";

        return `
        <div class="${cls}">
            <div class="vote">
                <button onclick="vote('${p.id}')"
                    ${!user || voted.includes(p.id) ? "disabled" : ""}>
                    ▲
                </button>
                <div>${p.votes}</div>
            </div>

            <div>
                <h3>${p.title}</h3>
                <p>${p.description}</p>

                <small>
                    ${a?.email || "anon"}
                    ${a?.is_admin ? '<span class="admin">ADMIN</span>' : ''}
                    ${a?.is_pro ? '<span class="vip">VIP</span>' : ''}
                </small>
            </div>
        </div>
        `;
    }).join("");
}

async function createPost(){
    await pb.collection("posts").create({
        title:title.value,
        description:desc.value,
        votes:0,
        status:"under-review",
        author:user.id
    });

    location.reload();
}

async function vote(id){
    if(voted.includes(id)){
        alert("Ты уже голосовал");
        return;
    }

    await pb.collection("votes").create({
        user:user.id,
        post:id
    });

    await pb.collection("posts").update(id, {
        "votes+":1
    });

    loadVotes();
    loadPosts();
}
</script>

</body>
</html>
