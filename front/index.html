<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Board PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>

<style>
:root {
    --primary:#007bff;
    --success:#28a745;
    --danger:#dc3545;
    --bg:#f4f7f6;
    --vip:#ffd700;
    --admin:#ff4757;
}

body {
    font-family:'Segoe UI',sans-serif;
    max-width:800px;
    margin:0 auto;
    padding:20px;
    background:var(--bg);
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.post {
    display:flex;
    gap:20px;
    border-left:5px solid var(--primary);
}

.post.is-vip { border-left-color:var(--vip); }
.post.is-admin-post { border-left-color:var(--admin); }
.post.is-rejected { opacity:0.5; }

.vote-section { text-align:center; }
.vote-count { font-size:22px; font-weight:bold; }

.vip-badge {
    background:var(--vip);
    padding:2px 6px;
    border-radius:4px;
    margin-left:5px;
}

.admin-badge {
    background:var(--admin);
    color:white;
    padding:2px 6px;
    border-radius:4px;
    margin-left:5px;
}

.status-badge {
    font-size:10px;
    padding:3px 8px;
    border-radius:10px;
    background:#eee;
}

.status-completed { background:#d4edda; }
.status-review { background:#fff3cd; }

button {
    padding:8px 15px;
    border:none;
    border-radius:6px;
    background:var(--primary);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>💡 Feedback System</h2>
    <div id="auth-section"></div>
</div>

<div id="auth-forms" class="card" style="display:none;">
    <input id="login-email" placeholder="Email">
    <input id="login-pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<div id="new-post" class="card" style="display:none;">
    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="createPost()">Post</button>
</div>

<div id="posts"></div>

<script>
const pb = new PocketBase("http://127.0.0.1:8090");
let currentUser = null;
let votedPosts = [];

window.onload = async () => {
    currentUser = pb.authStore.model;
    updateAuthUI();
    await loadVotes();
    loadPosts();
};

function updateAuthUI() {
    const el = document.getElementById("auth-section");

    if (currentUser) {
        el.innerHTML = `
            ${currentUser.email}
            ${currentUser.is_admin ? '<span class="admin-badge">ADMIN</span>' : ''}
            ${currentUser.is_pro ? '<span class="vip-badge">VIP</span>' : ''}
            <button onclick="logout()">Logout</button>
        `;
        document.getElementById("new-post").style.display = "block";
    } else {
        el.innerHTML = `<button onclick="showAuth()">Login</button>`;
    }
}

function showAuth() {
    document.getElementById("auth-forms").style.display = "block";
}

async function login() {
    await pb.collection("users").authWithPassword(
        login-email.value,
        login-pass.value
    );
    location.reload();
}

async function register() {
    await pb.collection("users").create({
        email: login-email.value,
        password: login-pass.value,
        passwordConfirm: login-pass.value
    });
    await login();
}

function logout() {
    pb.authStore.clear();
    location.reload();
}

async function loadVotes() {
    if (!currentUser) return;

    const votes = await pb.collection("votes").getFullList({
        filter: `user="${currentUser.id}"`
    });

    votedPosts = votes.map(v => v.post);
}

async function loadPosts() {
    const list = document.getElementById("posts");

    const posts = await pb.collection("posts").getFullList({
        sort: "-created",
        expand: "author"
    });

    list.innerHTML = posts.map(p => {
        const author = p.expand.author;

        if (p.status !== "completed" && currentUser?.id !== p.author && !currentUser?.is_admin) return "";

        let cls = "card post";
        if (author?.is_admin) cls += " is-admin-post";
        else if (author?.is_pro) cls += " is-vip";

        return `
        <div class="${cls}">
            <div class="vote-section">
                <button onclick="vote('${p.id}')"
                    ${!currentUser || votedPosts.includes(p.id) ? "disabled" : ""}>
                    ▲
                </button>
                <div class="vote-count">${p.votes}</div>
            </div>

            <div>
                <div>
                    <span class="status-badge ${p.status === 'completed' ? 'status-completed':'status-review'}">
                        ${p.status}
                    </span>
                </div>

                <h3>${p.title}</h3>
                <p>${p.description}</p>

                <div>
                    ${author?.email || "Anon"}
                    ${author?.is_admin ? '<span class="admin-badge">ADMIN</span>' : ''}
                    ${author?.is_pro ? '<span class="vip-badge">VIP</span>' : ''}
                </div>
            </div>
        </div>
        `;
    }).join("");
}

async function createPost() {
    await pb.collection("posts").create({
        title: title.value,
        description: desc.value,
        votes: 0,
        status: "under-review",
        author: currentUser.id
    });

    location.reload();
}

async function vote(id) {
    if (votedPosts.includes(id)) {
        alert("Ты уже голосовал!");
        return;
    }

    await pb.collection("votes").create({
        user: currentUser.id,
        post: id
    });

    await pb.collection("posts").update(id, {
        "votes+": 1
    });

    loadVotes();
    loadPosts();
}
</script>

</body>
</html>
