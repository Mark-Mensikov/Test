<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Board PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; --vip: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: var(--bg); color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .vip-badge { background: var(--vip); color: #333; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #b8860b; margin-left: 5px; }
        .post { display: flex; gap: 20px; border-left: 5px solid var(--primary); transition: 0.3s; }
        .post.is-vip { border-left-color: var(--vip); background: #fffdf0; }
        .vote-section { text-align: center; min-width: 60px; }
        .vote-count { display: block; font-size: 24px; font-weight: bold; margin: 5px 0; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: #eee; text-transform: uppercase; color: #666; }
        .nav-link { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 14px; }
        .author-info { font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2>💡 Tagasiside Portaal</h2>
        <div id="auth-section">Laadin...</div>
    </div>

    <div id="auth-forms" class="card" style="display: none;">
        <div id="login-view">
            <h3>Logi sisse</h3>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Parool">
            <button onclick="handleLogin()">Sisene</button>
            <p>Pole kontot? <span class="nav-link" onclick="toggleAuth(true)">Registreeri siin</span></p>
        </div>
        <div id="register-view" style="display: none;">
            <h3>Loo uus konto</h3>
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Parool">
            <input type="password" id="reg-pass-confirm" placeholder="Kinnita parool">
            <button onclick="handleRegister()" style="background: var(--success)">Loo konto</button>
            <p>On juba konto? <span class="nav-link" onclick="toggleAuth(false)">Logi sisse siin</span></p>
        </div>
    </div>

    <div id="vip-promo" class="card" style="display: none; background: linear-gradient(135deg, #fff9c4 0%, #ffffff 100%); border: 1px solid #ffe082;">
        <strong>Toeta meid ja saa VIP staatus!</strong> 15€ eest saad kuldse märgi ja Sinu ettepanekud tõstetakse esile.
        <br><br>
        <a href="https://buy.stripe.com/test_aFacN53uE0TNgqoeEHe7m02">
            <button style="background: var(--vip); color: #000; border: 1px solid #b8860b;">Osta VIP staatus</button>
        </a>
    </div>

    <div id="new-post-form" class="card" style="display: none;">
        <h3>Lisa uus ettepanek</h3>
        <input type="text" id="post-title" placeholder="Lühike pealkiri">
        <textarea id="post-desc" rows="3" placeholder="Selgita oma ideed..."></textarea>
        <button onclick="createNewPost()">Saada ettepanek</button>
    </div>

    <div id="posts-list">Laadin ettepanekuid...</div>

    <script>
        let pb;

        async function init() {
            try {
                const config = await fetch('/config').then(res => res.json());
                pb = new PocketBase(config.pbUrl);

                // --- STRIPE MAKSESÜSTEEMI KONTROLL ---
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('payment') === 'success' && pb.authStore.isValid) {
                    try {
                        await pb.collection('users').update(pb.authStore.model.id, { "is_pro": true });
                        await pb.collection('users').authRefresh();
                        window.history.replaceState({}, document.title, "/");
                        alert("Makse õnnestus! Oled nüüd VIP kasutaja.");
                        location.reload(); 
                        return;
                    } catch (err) { console.error("VIP viga:", err); }
                }

                renderUI();
                loadPosts();
            } catch (e) { console.error("Init viga:", e); }
        }

        function renderUI() {
            const authSection = document.getElementById('auth-section');
            const postForm = document.getElementById('new-post-form');
            const vipPromo = document.getElementById('vip-promo');
            const authForms = document.getElementById('auth-forms');

            if (pb.authStore.isValid) {
                const user = pb.authStore.model;
                const isVip = user.is_pro; 
                authSection.innerHTML = `
                    <span>${user.email} ${isVip ? '<span class="vip-badge">VIP</span>' : ''}</span>
                    <button onclick="logout()" style="background:var(--danger); margin-left:10px;">Välju</button>
                `;
                postForm.style.display = 'block';
                authForms.style.display = 'none';
                vipPromo.style.display = isVip ? 'none' : 'block';
            } else {
                authSection.innerHTML = `<button onclick="document.getElementById('auth-forms').style.display='block'">Logi sisse</button>`;
                postForm.style.display = 'none';
                vipPromo.style.display = 'none';
            }
        }

        async function handleLogin() {
            try {
                await pb.collection('users').authWithPassword(
                    document.getElementById('login-email').value,
                    document.getElementById('login-pass').value
                );
                location.reload();
            } catch (e) { alert("Viga sisselogimisel!"); }
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const passwordConfirm = document.getElementById('reg-pass-confirm').value;
            try {
                await pb.collection('users').create({ email, password, passwordConfirm, is_pro: false });
                await pb.collection('users').authWithPassword(email, password);
                location.reload();
            } catch (e) { alert("Viga: " + e.message); }
        }

        async function loadPosts() {
            const container = document.getElementById('posts-list');
            try {
                const posts = await pb.collection('posts').getFullList({ sort: '-votes', expand: 'author' });
                const user = pb.authStore.model;
                const isAdmin = user?.is_admin === true;

                container.innerHTML = posts.map(p => {
                    const authorIsVip = p.expand?.author?.is_pro;
                    const authorEmail = p.expand?.author?.email || "Tundmatu";
                    const canEdit = pb.authStore.isValid && ((user?.id === p.author && user?.is_pro) || isAdmin);
                    const canDelete = pb.authStore.isValid && isAdmin;

                    return `
                        <div class="card post ${authorIsVip ? 'is-vip' : ''}">
                            <div class="vote-section">
                                <button onclick="vote('${p.id}')" ${!pb.authStore.isValid ? 'disabled' : ''}>▲</button>
                                <span class="vote-count">${p.votes || 0}</span>
                            </div>
                            <div style="flex:1">
                                <div style="display: flex; justify-content: space-between;">
                                    <span class="status-badge">${p.status}</span>
                                    <span class="author-info">Autor: ${authorEmail}</span>
                                </div>
                                ${authorIsVip ? '<span class="vip-badge">VIP AUTOR</span>' : ''}
                                <h3 id="title-${p.id}" style="margin: 8px 0 4px 0">${p.title}</h3>
                                <p id="desc-${p.id}" style="margin:0; color:#666; font-size:14px;">${p.description || ''}</p>
                                <div style="margin-top: 10px; display: flex; gap: 10px;">
                                    ${canEdit ? `<button onclick="startEdit('${p.id}')" style="background:#6c757d; font-size:12px; padding:5px 10px;">Muuda</button>` : ''}
                                    ${canDelete ? `<button onclick="deletePost('${p.id}')" style="background:var(--danger); font-size:12px; padding:5px 10px;">Kustuta</button>` : ''}
                                    ${isAdmin && !authorIsVip ? `<button onclick="makeVip('${p.author}')" style="background:var(--vip); color:black; font-size:12px; padding:5px 10px;">Anna VIP</button>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { container.innerHTML = "Viga laadimisel."; }
        }

        async function vote(postId) {
            if (!pb.authStore.isValid) return alert("Logi sisse!");
            try {
                const post = await pb.collection('posts').getOne(postId);
                if (post.author === pb.authStore.model.id) return alert("Oma postituse poolt ei saa hääletada!");
                await pb.collection('votes').create({ user: pb.authStore.model.id, post: postId });
                await pb.collection('posts').update(postId, { "votes+": 1 });
                loadPosts();
            } catch (e) { alert("Sa oled juba hääletanud!"); }
        }

        async function createNewPost() {
            const title = document.getElementById('post-title').value;
            if(!title) return alert("Pealkiri puudu!");
            try {
                await pb.collection('posts').create({
                    title: title,
                    description: document.getElementById('post-desc').value,
                    votes: 0, status: 'under-review', author: pb.authStore.model.id
                });
                location.reload();
            } catch (e) { alert(e.message); }
        }

        async function startEdit(postId) {
            const titleEl = document.getElementById(`title-${postId}`);
            const descEl = document.getElementById(`desc-${postId}`);
            const newTitle = prompt("Uus pealkiri:", titleEl.innerText);
            const newDesc = prompt("Uus kirjeldus:", descEl.innerText);
            if (newTitle) {
                try {
                    await pb.collection('posts').update(postId, { title: newTitle, description: newDesc });
                    loadPosts();
                } catch (e) { alert("Viga!"); }
            }
        }

        async function deletePost(postId) {
            if (!confirm("Kas soovid kustutada?")) return;
            try {
                await pb.collection('posts').delete(postId);
                loadPosts();
            } catch (e) { alert("Viga!"); }
        }

        async function makeVip(userId) {
            if (!confirm("Kas soovid anda kasutajale VIP staatuse?")) return;
            try {
                await pb.collection('users').update(userId, { "is_pro": true });
                alert("Kasutaja on nüüd VIP!");
                loadPosts();
            } catch (e) { alert("Viga: " + e.message); }
        }

        function toggleAuth(showReg) {
            document.getElementById('login-view').style.display = showReg ? 'none' : 'block';
            document.getElementById('register-view').style.display = showReg ? 'block' : 'none';
        }
        function logout() { pb.authStore.clear(); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
