<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Meie SaaS PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pocketbase/0.21.1/pocketbase.umd.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .record { background: #f4f4f4; padding: 10px; margin: 5px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Meie SaaS PRO</h1>
    <p>Upgrade to PRO – 15€/month</p>

    <a href="https://buy.stripe.com/test_eVq14n9T2gSL2zycwze7m01">
        <button>Buy PRO</button>
    </a>

    <hr>
    <h2>Päeviku sissekanded (Diary):</h2>
    <div id="diary-list">Laadin...</div>

    <script>
        async function init() {
            // 1. Получаем URL из нашего сервера (чтобы не хардкодить его везде)
            const config = await fetch('/config').then(res => res.json());
            
            // 2. Инициализируем PocketBase через SDK
            // (В браузере через UMD скрипт он доступен как PocketBase)
            const pb = new PocketBase(config.pbUrl);

            try {
                // 3. Используем ваш код для получения данных
                // Мы берем коллекцию 'diary', как в вашем примере
                const records = await pb.collection('diary').getFullList({
                    sort: '-created', // Сортировка по дате создания (новые сверху)
                });

                const container = document.getElementById('diary-list');
                container.innerHTML = '';

                if (records.length === 0) {
                    container.innerHTML = 'Sissekandeid ei leitud.';
                    return;
                }

                // 4. Выводим записи
                records.forEach(record => {
                    const div = document.createElement('div');
                    div.className = 'record';
                    // Предположим, в коллекции diary есть поле 'text' или 'title'
                    div.innerHTML = `
                        <small>${new Date(record.created).toLocaleString()}</small>
                        <p>${record.text || record.title || 'Sisu puudub'}</p>
                    `;
                    container.appendChild(div);
                });

            } catch (err) {
                console.error("PocketBase viga:", err);
                document.getElementById('diary-list').innerHTML = "Viga andmete laadimisel.";
            }
        }

        init();
    </script>
</body>
</html>
